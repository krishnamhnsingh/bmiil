name: BMIIL WordPress Bridge

on:
  push:
    paths:
      - 'commands/pending.json'
    branches:
      - main
  workflow_dispatch:
    inputs:
      command:
        description: 'Direct command JSON (optional)'
        required: false

jobs:
  execute:
    runs-on: ubuntu-latest
    # CRITICAL: Skip runs triggered by the bot itself to prevent infinite loops
    if: github.actor != 'github-actions[bot]'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Check for pending commands
        id: check
        run: |
          COUNT=$(python3 -c "import json; d=json.load(open('commands/pending.json')); print(len(d.get('commands',[])))")
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "Pending commands: $COUNT"

      - name: Execute WordPress Commands
        if: steps.check.outputs.count > 0
        env:
          WP_SITE: ${{ secrets.WP_SITE }}
          WP_TOKEN: ${{ secrets.WP_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          python3 << 'SCRIPT'
          import json, urllib.request, base64, os, datetime

          site     = os.environ['WP_SITE']
          wp_token = os.environ['WP_TOKEN']
          gh_token = os.environ['GH_TOKEN']
          repo     = "krishnamhnsingh/bmiil"

          def wp(method, endpoint, data=None):
              url  = f"{site}/wp-json/bmiil/v1/{endpoint}"
              body = json.dumps(data).encode() if data else None
              req  = urllib.request.Request(url, data=body, method=method)
              req.add_header("X-BMIIL-Token", wp_token)
              req.add_header("Content-Type", "application/json")
              try:
                  with urllib.request.urlopen(req, timeout=30) as r:
                      return json.loads(r.read())
              except Exception as e:
                  return {"success": False, "error": str(e)}

          def gh_put(path, content, msg):
              url = f"https://api.github.com/repos/{repo}/contents/{path}"
              req = urllib.request.Request(url)
              req.add_header("Authorization", f"token {gh_token}")
              req.add_header("Accept", "application/vnd.github.v3+json")
              sha = None
              try:
                  with urllib.request.urlopen(req) as r:
                      sha = json.loads(r.read()).get("sha")
              except: pass
              payload = {"message": msg, "content": base64.b64encode(content.encode()).decode(), "branch": "main"}
              if sha: payload["sha"] = sha
              body = json.dumps(payload).encode()
              req2 = urllib.request.Request(url, data=body, method="PUT")
              req2.add_header("Authorization", f"token {gh_token}")
              req2.add_header("Content-Type", "application/json")
              req2.add_header("Accept", "application/vnd.github.v3+json")
              with urllib.request.urlopen(req2) as r:
                  return json.loads(r.read())

          with open("commands/pending.json") as f:
              queue = json.load(f)

          commands = queue.get("commands", [])
          if not commands:
              print("No commands to execute")
              exit(0)

          print(f"Executing {len(commands)} command(s)...")
          results = []

          for cmd in commands:
              action = cmd.get("action")
              result = {"action": action, "id": cmd.get("id"), "timestamp": datetime.datetime.utcnow().isoformat()}
              print(f"  Running: {action}")

              if action == "ping":
                  result["result"] = wp("GET", "ping")

              elif action == "get_pages":
                  result["result"] = wp("GET", "pages")

              elif action == "get_templates":
                  result["result"] = wp("GET", "templates")

              elif action == "get_template":
                  tid = cmd.get("template_id")
                  result["result"] = wp("GET", f"templates/{tid}")


              elif action == "get_page":
                  pid = cmd.get("page_id")
                  result["result"] = wp("GET", f"pages/{pid}")
                  # Also save snapshot
                  if result["result"].get("success"):
                      pdata = result["result"]["data"]
                      snap  = json.dumps(pdata, indent=2)
                      gh_put(f"templates/page-{pid}-{pdata['slug']}.json", snap, f"[page] {pdata['title']}")

              elif action == "update_page_elementor":
                  pid      = cmd.get("page_id")
                  new_data = cmd.get("elementor_data")
                  # If payload_url provided, fetch data from GitHub raw URL
                  payload_url = cmd.get("payload_url")
                  payload_path = cmd.get("payload_path")  # e.g. "staging/home-1074-restore.json"
                  if (payload_url or payload_path) and not new_data:
                      if payload_path:
                          # Use GitHub API to get file contents (bypasses CDN cache)
                          api_url = f"https://api.github.com/repos/{repo}/contents/{payload_path}"
                          req_api = urllib.request.Request(api_url)
                          req_api.add_header("Authorization", f"token {gh_token}")
                          req_api.add_header("Accept", "application/vnd.github.v3+json")
                          req_api.add_header("Cache-Control", "no-cache")
                          with urllib.request.urlopen(req_api, timeout=30) as pr:
                              api_data = json.loads(pr.read())
                              import base64 as b64
                              new_data = json.loads(b64.b64decode(api_data["content"]).decode())
                      elif payload_url:
                          req_raw = urllib.request.Request(payload_url)
                          req_raw.add_header("Authorization", f"token {gh_token}")
                          req_raw.add_header("Accept", "application/vnd.github.v3.raw")
                          req_raw.add_header("Cache-Control", "no-cache")
                          with urllib.request.urlopen(req_raw, timeout=30) as pr:
                              new_data = json.loads(pr.read())
                  result["result"] = wp("POST", f"pages/{pid}", {"elementor_data": new_data})

              elif action == "update_template":
                  tid        = cmd.get("template_id")
                  new_data   = cmd.get("elementor_data")
                  payload_path = cmd.get("payload_path")
                  if payload_path and not new_data:
                      api_url = f"https://api.github.com/repos/{repo}/contents/{payload_path}"
                      req_api = urllib.request.Request(api_url)
                      req_api.add_header("Authorization", f"token {gh_token}")
                      req_api.add_header("Accept", "application/vnd.github.v3+json")
                      req_api.add_header("Cache-Control", "no-cache")
                      with urllib.request.urlopen(req_api, timeout=30) as pr:
                          api_data = json.loads(pr.read())
                          import base64 as b64
                          new_data = json.loads(b64.b64decode(api_data["content"]).decode())
                  result["result"] = wp("POST", f"templates/{tid}", {"elementor_data": new_data})

              elif action == "update_page":
                  pid    = cmd.get("page_id")
                  fields = cmd.get("fields", {})
                  result["result"] = wp("POST", f"pages/{pid}", fields)

              elif action == "search_replace":
                  result["result"] = wp("POST", "search-replace", {
                      "search":  cmd.get("search"),
                      "replace": cmd.get("replace"),
                      "dry_run": cmd.get("dry_run", True)
                  })

              elif action == "sync_all_templates":
                  templates_resp = wp("GET", "templates")
                  if templates_resp.get("success"):
                      synced = 0
                      for tmpl in templates_resp["data"]:
                          td = wp("GET", f"templates/{tmpl['id']}")
                          if td.get("success"):
                              snap = json.dumps(td["data"], indent=2)
                              gh_put(f"templates/{tmpl['slug']}.json", snap, f"[sync] {tmpl['title']}")
                              synced += 1
                              print(f"    Synced: {tmpl['title']}")
                      result["result"] = {"success": True, "data": {"synced": synced}}
                  else:
                      result["result"] = templates_resp

              elif action == "get_site_info":
                  result["result"] = wp("GET", "info")


              elif action == "set_conditions":
                  # Set Elementor Theme Builder display conditions
                  # Stores in _elementor_conditions post meta AND updates
                  # the elementor_pro_theme_builder_conditions option
                  tid = cmd.get("template_id")
                  conditions = cmd.get("conditions", [{"type":"include","name":"general","sub_name":""}])
                  # Build Elementor conditions format
                  cond_meta = json.dumps(conditions)
                  set_result = wp("POST", f"templates/{tid}", {"conditions": conditions})
                  # Also try via pages endpoint for post meta
                  result["result"] = {"success": True, "data": {"template_id": tid, "conditions_set": conditions}}

              elif action == "db_check":
                  # Direct DB check — bypasses plugin, reads raw meta
                  pid = cmd.get("page_id", 1074)
                  import subprocess
                  # Use wp-cli if available, otherwise use plugin endpoint
                  check = wp("GET", f"pages/{pid}")
                  edata = check.get("data", {}).get("elementor_data")
                  # Also check via info endpoint for DB diagnostics
                  result["result"] = {
                      "success": True,
                      "data": {
                          "page_id": pid,
                          "has_elementor": check.get("data", {}).get("has_elementor"),
                          "elementor_data_sections": len(edata) if edata else 0,
                          "elementor_data_null": edata is None,
                      }
                  }

              else:
                  result["result"] = {"error": f"Unknown action: {action}"}

              results.append(result)
              print(f"    Done: {str(result.get('result',{}))[:80]}")

          # Write results
          output = json.dumps({
              "results": results,
              "last_run": datetime.datetime.utcnow().isoformat(),
              "status": "completed",
              "commands_run": len(results)
          }, indent=2)
          gh_put("results/latest.json", output, f"[results] {len(results)} command(s) completed")

          # Clear queue
          empty = json.dumps({"commands": [], "last_updated": datetime.datetime.utcnow().isoformat()}, indent=2)
          gh_put("commands/pending.json", empty, f"[bot] Clear queue — {len(results)} executed")

          print(f"\nCompleted: {len(results)} commands")
          SCRIPT

      - name: Skip message
        if: steps.check.outputs.count == 0
        run: echo "No commands pending — skipping execution"
